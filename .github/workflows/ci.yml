name: CI

on:
  pull_request:
    branches: [dev, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bujo_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TZ: Asia/Taipei
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bujo_ci?schema=public
      JWT_SECRET: ci-test-secret
      GOOGLE_CLIENT_ID: ci-test-google-client-id
      FRONTEND_URL: http://localhost:5173
      ALLOWED_ORIGINS: http://localhost:5173
      LINE_CHANNEL_ID: ci-test-line-channel-id
      LINE_CHANNEL_SECRET: ci-test-line-channel-secret
      LINE_CALLBACK_URL: http://localhost:3000/api/auth/line/callback
      LINE_PUSH_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Jest tests
        run: npm test
